    include-all: true
  - name: 🛩️ 高速节点
    type: select
    filter: (?=.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(深港|家宽|游戏|剩余|流量|0.5|0.5倍|0.5x|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x|5.0|5倍|5x)).)*$
    include-all: true
  - name: 🕊️便宜节点
    type: select
    filter: (?=.*(0.5|0.5倍|0.5x))
    include-all: true
  - name: 🇭🇰 香港节点
    type: select
