    include-all: true
  - name: 🇯🇵 日本节点
    type: select
    filter: (?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$
    include-all: true
  - name: 🇸🇬 加坡节点
    type: select
    filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$
    include-all: true
  - name: 🇺🇲 美国节点
    type: select
    filter: (美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
    include-all: true
  - name: 🇺🇸 美国政府
    type: select
    proxies:
      - Relay-US1
      - Relay-US2
      - 🚀 节点选择
      - DIRECT
  - name: 🌐 其他地区
    type: select
    filter: (^(?!.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore)).*)
    include-all: true
  - name: 🔯 香港故转
    type: fallback
    filter: (?=.*(香港|HK|Hong Kong|🇭🇰|HongKong))^((?!(深港|家宽|游戏|剩余|流量|0.5|0.5倍|0.5x|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x|5.0|5倍|5x)).)*$
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50
    include-all: true
